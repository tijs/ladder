name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        run: swift test 2>&1 | head -100

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: swift build -c release

      - name: Package archive
        run: |
          cp .build/release/ladder ladder-aarch64-apple-darwin
          tar czf "ladder-${VERSION}-aarch64-apple-darwin.tar.gz" ladder-aarch64-apple-darwin

      - name: Generate checksums
        run: |
          shasum -a 256 ladder-"${VERSION}"-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            ladder-"${VERSION}"-*.tar.gz \
            checksums.txt
